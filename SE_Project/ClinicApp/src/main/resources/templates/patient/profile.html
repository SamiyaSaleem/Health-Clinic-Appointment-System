<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AppointCare Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; margin-left: 70px; padding: 40px; overflow-y: auto; }

        .page-header { margin-bottom: 26px; }
        .page-header h1 { font-size: 28px; font-weight: 800; color: #0f1f3d; margin-bottom: 4px; }
        .page-header p { color: #64748b; font-size: 14px; }

        .profile-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .profile-card { background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1px solid #e8edf5; }
        .card-title { font-size: 16px; font-weight: 700; color: #0f1f3d; display: flex; align-items: center; gap: 10px; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid #f1f5f9; }
        .card-title i { color: #0284c7; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px; background: #f8fafc; transition: all 0.2s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #0284c7; background: #fff; box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }
        .form-group input[readonly] { background: #f1f5f9; color: #64748b; cursor: not-allowed; }

        .btn { width: 100%; padding: 11px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #0284c7, #0369a1); color: #fff; }
        .btn-primary:hover { box-shadow: 0 4px 14px rgba(2,132,199,0.3); transform: translateY(-1px); }

        .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        @media (max-width: 768px) { .profile-container { grid-template-columns: 1fr; } .main-content { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main-content">
        <div class="page-header">
            <h1>My Profile</h1>
            <p>Manage your account information and security settings.</p>
        </div>

        <div class="profile-container">
            <div class="profile-card">
                <div class="card-title"><i class="fas fa-user"></i> Account Information</div>

                <div th:if="${param.updated}" class="alert alert-success"><i class="fas fa-check-circle"></i> Profile updated successfully.</div>

                <form method="POST" th:action="@{/patient/profile/update}">
                    <div class="form-group"><label>Full Name</label><input type="text" th:value="${user.fullName}" readonly></div>
                    <div class="form-group"><label>Email Address</label><input type="email" th:value="${user.email}" readonly></div>
                    <div class="form-group"><label for="phone">Phone Number</label><input type="tel" id="phone" name="phone" th:value="${user.phone}" placeholder="Enter your phone number"></div>
                    <div class="form-group"><label for="address">Address</label><input type="text" id="address" name="address" th:value="${user.address}" placeholder="Enter your address"></div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>

            <div class="profile-card">
                <div class="card-title"><i class="fas fa-lock"></i> Change Password</div>

                <div th:if="${param.passwordChanged}" class="alert alert-success"><i class="fas fa-check-circle"></i> Password changed successfully.</div>
                <div th:if="${param.passwordError}" class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Password change failed. Please try again.</div>

                <form method="POST" th:action="@{/patient/change-password}">
                    <div class="form-group"><label for="currentPassword">Current Password</label><input type="password" id="currentPassword" name="currentPassword" required placeholder="Enter current password"></div>
                    <div class="form-group"><label for="newPassword">New Password</label><input type="password" id="newPassword" name="newPassword" required placeholder="Min 8 chars, 1 uppercase, 1 digit"></div>
                    <div class="form-group"><label for="confirmPassword">Confirm New Password</label><input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat new password"></div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
