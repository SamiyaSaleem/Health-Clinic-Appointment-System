<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - AppointCare Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; margin-left: 70px; padding: 40px; overflow-y: auto; }

        .page-header { margin-bottom: 22px; }
        .page-header h1 { font-size: 28px; font-weight: 800; color: #0f1f3d; margin-bottom: 4px; }
        .page-header p { color: #64748b; font-size: 14px; }

        .filters-bar { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 999px; background: #fff; border: 1.5px solid #e2e8f0; color: #334155; text-decoration: none; font-size: 13px; font-weight: 600; transition: all 0.18s; }
        .chip:hover { border-color: #0284c7; color: #0284c7; }
        .chip.active { background: rgba(2,132,199,0.08); border-color: rgba(2,132,199,0.4); color: #0369a1; font-weight: 700; }
        .chip-count { display: inline-block; min-width: 20px; padding: 1px 6px; border-radius: 999px; background: #f1f5f9; color: #475569; font-size: 11px; font-weight: 800; }

        .filter-form { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
        .filter-field { display: flex; flex-direction: column; gap: 5px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-input { height: 38px; padding: 0 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; }
        .filter-input:focus { outline: none; border-color: #0284c7; box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }
        .btn-link { display: inline-flex; align-items: center; justify-content: center; height: 38px; padding: 0 14px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; color: #0284c7; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 13px; }
        .btn-link:hover { border-color: #0284c7; background: #f0f9ff; }

        .appointments-container { background: #fff; border-radius: 14px; padding: 26px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1px solid #e8edf5; }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        th { padding: 12px 14px; text-align: left; font-weight: 700; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; }
        td { padding: 14px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-size: 14px; }
        tbody tr:hover { background: #f8fafc; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .status-pending   { background: #fef3c7; color: #d97706; }
        .status-confirmed { background: #dbeafe; color: #0284c7; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-cancelled { background: #fee2e2; color: #dc2626; }
        .status-no_show   { background: #e5e7eb; color: #374151; }

        .status-note { margin-top: 5px; color: #94a3b8; font-size: 12px; }

        .empty-state { text-align: center; padding: 52px 20px; }
        .empty-state i { font-size: 48px; color: #cbd5e1; margin-bottom: 14px; display: block; }
        .empty-state p { color: #94a3b8; margin-bottom: 18px; }
        .empty-state a { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; background: #0284c7; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 14px; transition: background 0.2s; }
        .empty-state a:hover { background: #0369a1; }

        @media (max-width: 768px) { .main-content { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main-content">
        <div class="page-header">
            <h1>My Appointments</h1>
            <p>View and manage all your scheduled appointments.</p>
        </div>

        <div class="filters-bar">
            <div class="chips">
                <a class="chip" th:classappend="${activeTab == 'all' ? ' active' : ''}" th:href="@{/patient/appointments(from=${filterFrom}, to=${filterTo})}">All <span class="chip-count" th:text="${countAll}">0</span></a>
                <a class="chip" th:classappend="${activeTab == 'pending' ? ' active' : ''}" th:href="@{/patient/appointments(tab='pending', from=${filterFrom}, to=${filterTo})}">Pending <span class="chip-count" th:text="${countPending}">0</span></a>
                <a class="chip" th:classappend="${activeTab == 'upcoming' ? ' active' : ''}" th:href="@{/patient/appointments(tab='upcoming', from=${filterFrom}, to=${filterTo})}">Upcoming <span class="chip-count" th:text="${countUpcoming}">0</span></a>
                <a class="chip" th:classappend="${activeTab == 'past' ? ' active' : ''}" th:href="@{/patient/appointments(tab='past', from=${filterFrom}, to=${filterTo})}">Past <span class="chip-count" th:text="${countPast}">0</span></a>
                <a class="chip" th:classappend="${activeTab == 'cancelled' ? ' active' : ''}" th:href="@{/patient/appointments(tab='cancelled', from=${filterFrom}, to=${filterTo})}">Cancelled <span class="chip-count" th:text="${countCancelled}">0</span></a>
            </div>
            <form class="filter-form" method="GET" th:action="@{/patient/appointments}">
                <input type="hidden" name="tab" th:value="${activeTab}" />
                <div class="filter-field"><label for="from">From</label><input class="filter-input" id="from" type="date" name="from" th:value="${filterFrom}" onchange="this.form.submit()" /></div>
                <div class="filter-field"><label for="to">To</label><input class="filter-input" id="to" type="date" name="to" th:value="${filterTo}" onchange="this.form.submit()" /></div>
                <a class="btn-link" th:href="@{/patient/appointments}">Clear</a>
            </form>
        </div>

        <div class="appointments-container">
            <div th:if="${appointments != null && !appointments.isEmpty()}">
                <table>
                    <thead><tr><th>Doctor</th><th>Specialization</th><th>Date</th><th>Time</th><th>Reason</th><th>Status</th></tr></thead>
                    <tbody>
                    <tr th:each="apt : ${appointments}">
                        <td style="font-weight:600;" th:text="${apt.doctor.user.fullName}">Dr. Name</td>
                        <td style="color:#64748b;" th:text="${apt.doctor.specialization}">Specialization</td>
                        <td th:text="${#temporals.format(apt.appointmentDate, 'dd MMM yyyy')}">01 Jan 2026</td>
                        <td th:text="${#temporals.format(apt.appointmentTime, 'HH:mm')}">10:00</td>
                        <td style="color:#475569;" th:text="${apt.reason}">Reason</td>
                        <td>
                            <span class="badge" th:classappend="${'status-' + apt.status.name().toLowerCase()}" th:text="${apt.status}">Status</span>
                            <div class="status-note" th:if="${apt.status.name() == 'CANCELLED' && apt.cancelledBy != null && apt.cancelledBy.name() == 'DOCTOR' && apt.cancellationReason != null && !#strings.isEmpty(apt.cancellationReason)}"
                                 th:text="${'Rejected: ' + apt.cancellationReason}">Rejected: reason</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:unless="${appointments != null && !appointments.isEmpty()}" class="empty-state">
                <i class="fas fa-calendar-times"></i>
                <p>No appointments found.</p>
                <a href="/patient/appointments/new"><i class="fas fa-calendar-plus"></i> Book an Appointment</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
