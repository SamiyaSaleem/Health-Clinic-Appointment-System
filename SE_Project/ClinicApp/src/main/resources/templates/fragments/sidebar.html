<div xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="sidebar" class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-leaf"></i>
    </div>

    <div class="sidebar-brand" aria-label="Company">
        <span>AppointCare Solutions</span>
    </div>

    <nav class="sidebar-nav">
        <div sec:authorize="hasRole('PATIENT')">
            <a href="/patient/dashboard" class="sidebar-item" title="Dashboard">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/patient/appointments/new" class="sidebar-item" title="Book Appointment">
                <i class="fas fa-calendar-plus"></i>
                <span>Book Appointment</span>
            </a>
            <a href="/patient/appointments" class="sidebar-item" title="Manage Appointments">
                <i class="fas fa-calendar-check"></i>
                <span>Manage Appointments</span>
            </a>
            <a href="/patient/profile" class="sidebar-item" title="Manage Profile">
                <i class="fas fa-user"></i>
                <span>Manage Profile</span>
            </a>
            <a href="/support" class="sidebar-item" title="Contact Support">
                <i class="fas fa-envelope"></i>
                <span>Contact Support</span>
            </a>
        </div>

        <div sec:authorize="hasRole('DOCTOR')">
            <a href="/doctor/dashboard" class="sidebar-item" title="Dashboard">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/doctor/appointments" class="sidebar-item" title="Manage Appointments">
                <i class="fas fa-calendar-check"></i>
                <span>Manage Appointments</span>
            </a>
            <a href="/doctor/profile" class="sidebar-item" title="Manage Profile">
                <i class="fas fa-user-md"></i>
                <span>Manage Profile</span>
            </a>
            <a href="/support" class="sidebar-item" title="Contact Support">
                <i class="fas fa-envelope"></i>
                <span>Contact Support</span>
            </a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <a href="/admin/dashboard" class="sidebar-item" title="Admin Dashboard">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin/appointments" class="sidebar-item" title="Manage Appointments">
                <i class="fas fa-calendar-check"></i>
                <span>Manage Appointments</span>
            </a>
            <a href="/admin/doctors" class="sidebar-item" title="Manage Doctors">
                <i class="fas fa-user-md"></i>
                <span>Manage Doctors</span>
            </a>
            <a href="/admin/doctors/requests" class="sidebar-item" title="Doctor Approval Requests" style="position:relative;">
                <i class="fas fa-user-clock"></i>
                <span>Doctor Requests</span>
                <span th:with="cnt=${@doctorService.getPendingApprovals().size()}"
                      th:if="${cnt > 0}"
                      th:text="${cnt}"
                      style="margin-left:auto; background:#f59e0b; color:#fff; border-radius:999px;
                             font-size:11px; font-weight:900; padding:2px 7px; line-height:1.5;
                             min-width:20px; text-align:center;">0</span>
            </a>
            <a href="/admin/users" class="sidebar-item" title="Manage Users">
                <i class="fas fa-users"></i>
                <span>Manage Users</span>
            </a>
            <a href="/admin/support" class="sidebar-item" title="Support Requests">
                <i class="fas fa-life-ring"></i>
                <span>Support Requests</span>
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="POST" style="width: 100%;">
            <button type="submit" class="sidebar-item logout" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </form>
    </div>

    <style>
        .sidebar {
            width: 70px;
            background: linear-gradient(135deg, #0b1f3a 0%, #123b73 100%);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            transition: width 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .sidebar:hover {
            width: 250px;
        }

        .sidebar-header {
            width: 50px;
            height: 50px;
            background: #1e40af;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            color: white;
            font-size: 28px;
            flex-shrink: 0;
        }

        .sidebar:hover .sidebar-header {
            width: 60px;
            height: 60px;
            font-size: 32px;
            margin-left: 20px;
        }

        .sidebar-nav {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 10px;
        }

        .sidebar-brand {
            width: 100%;
            padding: 0 10px;
            height: 34px;
            margin: -10px 0 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.92);
            font-weight: 700;
            letter-spacing: 0.4px;
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar-brand span {
            display: none;
        }

        .sidebar:hover .sidebar-brand span {
            display: inline;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(30, 64, 175, 0.22);
            color: white;
            border-left-color: #1e40af;
        }

        .sidebar-item i {
            font-size: 20px;
            min-width: 20px;
            text-align: center;
        }

        .sidebar-item span {
            display: none;
        }

        .sidebar:hover .sidebar-item span {
            display: inline;
        }

        .sidebar-footer {
            width: 100%;
            padding: 0 10px;
        }

        .sidebar-footer form {
            width: 100%;
        }

        .logout {
            color: #ff6b6b !important;
        }

        .logout:hover {
            background: rgba(255, 107, 107, 0.2) !important;
            border-left-color: #ff6b6b !important;
        }
    </style>
</div>
