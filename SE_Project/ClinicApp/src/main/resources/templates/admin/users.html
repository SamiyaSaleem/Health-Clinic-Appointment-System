<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin - AppointCare Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; margin-left: 70px; padding: 40px; overflow-y: auto; }

        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 28px; font-weight: 800; color: #0f1f3d; margin-bottom: 4px; }
        .page-header p { color: #64748b; font-size: 14px; }

        .flash { padding: 13px 16px; border-radius: 10px; margin-bottom: 16px; max-width: 1100px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .flash-success { background: #dcfce7; border: 1px solid #bbf7d0; color: #166534; }
        .flash-error   { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }

        .card { background: #fff; border-radius: 14px; padding: 26px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); max-width: 1100px; border: 1px solid #e8edf5; }
        .card-title { font-size: 16px; font-weight: 700; color: #0f1f3d; display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .card-title i { color: #0284c7; }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        th { padding: 12px 14px; text-align: left; font-weight: 700; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; }
        td { padding: 13px 14px; border-bottom: 1px solid #f1f5f9; color: #1e293b; vertical-align: middle; font-size: 14px; }
        tbody tr:hover { background: #f8fafc; }
        .muted { color: #94a3b8; font-size: 14px; padding: 20px 0; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid transparent; }
        .badge-enabled  { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .badge-disabled { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .badge-admin    { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
        .badge-doctor   { background: #fef3c7; color: #92400e; border-color: #fde68a; }
        .badge-patient  { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }

        .row-actions { display: flex; gap: 8px; align-items: center; }
        .btn { padding: 7px 14px; border: none; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.18s; font-family: inherit; }
        .btn-neutral { background: #0ea5e9; color: #fff; }
        .btn-neutral:hover { background: #0284c7; box-shadow: 0 2px 8px rgba(2,132,199,0.3); }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; box-shadow: 0 2px 8px rgba(220,38,38,0.3); }

        @media (max-width: 768px) { .main-content { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main-content">
        <div class="page-header">
            <h1>Manage Users</h1>
            <p>Enable or disable user accounts across all roles.</p>
        </div>

        <div th:if="${param.updated}" class="flash flash-success"><i class="fas fa-check-circle"></i> User updated successfully.</div>
        <div th:if="${error != null}" class="flash flash-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span></div>

        <div class="card">
            <div class="card-title">
                <i class="fas fa-users"></i>
                All Users
                <span style="background:#f1f5f9; color:#334155; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:800;" th:text="${totalCount}">0</span>
            </div>
            <div th:if="${users != null && !users.isEmpty()}">
                <table>
                    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td style="font-weight:600;" th:text="${u.fullName != null ? u.fullName : '—'}">Name</td>
                        <td style="color:#64748b;" th:text="${u.email != null ? u.email : '—'}">Email</td>
                        <td>
                            <span class="badge" th:classappend="${u.role != null && u.role.name() == 'ADMIN' ? ' badge-admin' : (u.role != null && u.role.name() == 'DOCTOR' ? ' badge-doctor' : ' badge-patient')}" th:text="${u.role}">ROLE</span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${u.enabled ? ' badge-enabled' : ' badge-disabled'}" th:text="${u.enabled ? 'ENABLED' : 'DISABLED'}">ENABLED</span>
                        </td>
                        <td>
                            <div class="row-actions">
                                <form th:action="@{/admin/users/{id}/toggle-enabled(id=${u.id})}" method="POST">
                                    <button class="btn" th:classappend="${u.enabled ? ' btn-danger' : ' btn-neutral'}"
                                            th:text="${u.enabled ? 'Disable' : 'Enable'}" type="submit">Disable</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:unless="${users != null && !users.isEmpty()}" class="muted">No users found.</div>
        </div>
    </div>
</div>
</body>
</html>
