<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Profile</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <div class="card-pro p-4 p-md-5">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
      <div>
        <div class="brand-badge mb-2">
          <span class="brand-dot"></span>
          HealthTech Clinic
        </div>
        <h2 class="mb-1">Patient Profile</h2>
        <div class="small-muted">View and update your contact details.</div>
      </div>

      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary" href="/">Dashboard</a>
        <a class="btn btn-outline-secondary" href="/logout">Logout</a>
      </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success">Profile updated successfully!</div>
    <div th:if="${param.passwordChanged}" class="alert alert-success">Password updated successfully!</div>

    <div class="row g-4 mt-1">
      <div class="col-lg-5">
        <div class="card-pro p-3">
          <h5 class="mb-3">Account Details</h5>
          <div class="mb-2"><span class="small-muted">Full Name</span><div class="fw-semibold" th:text="${patient.fullName}"></div></div>
          <div class="mb-2"><span class="small-muted">Email</span><div class="fw-semibold" th:text="${patient.email}"></div></div>
          <div class="mb-2"><span class="small-muted">Date of Birth</span><div class="fw-semibold" th:text="${patient.dateOfBirth}"></div></div>

          <a class="btn btn-outline-primary mt-3 w-100" href="/profile/change-password">Change Password</a>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card-pro p-3">
          <h5 class="mb-3">Update Contact</h5>
          <form method="post" action="/profile/update">
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input class="form-control" type="text" name="phone" th:value="${patient.phone}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Address</label>
              <input class="form-control" type="text" name="address" th:value="${patient.address}" required>
            </div>
            <button class="btn btn-brand text-white" type="submit">Save Changes</button>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
