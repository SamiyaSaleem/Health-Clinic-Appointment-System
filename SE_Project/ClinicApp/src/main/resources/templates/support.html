<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support - AppointCare Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; margin-left: 70px; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        .page-header { margin-bottom: 24px; text-align: center; width: 100%; max-width: 680px; }
        .page-header h1 { font-size: 28px; font-weight: 800; color: #0f1f3d; margin-bottom: 6px; }
        .page-header p { color: #64748b; font-size: 14px; }

        .flash { padding: 13px 16px; border-radius: 10px; margin-bottom: 18px; width: 100%; max-width: 680px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .flash-success { background: #dcfce7; border: 1px solid #bbf7d0; color: #166534; }
        .flash-error   { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }

        .card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); max-width: 680px; width: 100%; border: 1px solid #e8edf5; }
        .card-title { font-size: 17px; font-weight: 800; color: #0f1f3d; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
        .card-title i { color: #0284c7; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px; background: #f8fafc; transition: all 0.2s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #0284c7; background: #fff; box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }
        .form-group textarea { resize: vertical; min-height: 140px; }

        .btn-send { padding: 12px 20px; border: none; border-radius: 8px; background: linear-gradient(135deg, #0284c7, #0369a1); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-send:hover { box-shadow: 0 4px 14px rgba(2,132,199,0.3); transform: translateY(-1px); }

        .form-footer { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 13px; }

        @media (max-width: 768px) { .main-content { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main-content">
        <div class="page-header">
            <h1>Contact Support</h1>
            <p>Send a message to the admin team and we will get back to you shortly.</p>
        </div>

        <div th:if="${param.sent}" class="flash flash-success"><i class="fas fa-check-circle"></i> Your support request has been sent.</div>
        <div th:if="${error != null}" class="flash flash-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span></div>

        <div class="card">
            <div class="card-title"><i class="fas fa-envelope"></i> Support Request</div>
            <form method="POST" th:action="@{/support}">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input id="subject" name="subject" maxlength="120" required placeholder="e.g., Cannot access doctor dashboard" />
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" maxlength="4000" required placeholder="Describe your issue in detail. Include any relevant appointment dates or times."></textarea>
                </div>
                <button type="submit" class="btn-send"><i class="fas fa-paper-plane"></i> Send Request</button>
            </form>
            <div class="form-footer">For urgent issues, please include your email and any relevant appointment details.</div>
        </div>
    </div>
</div>
</body>
</html>
