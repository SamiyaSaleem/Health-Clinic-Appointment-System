<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Change Password</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card-pro p-4 p-md-5">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <div class="brand-badge mb-2">
              <span class="brand-dot"></span>
              HealthTech Clinic
            </div>
            <h2 class="mb-1">Change Password</h2>
            <div class="small-muted">
              For your security, choose a strong password.
            </div>
          </div>

          <a class="btn btn-outline-secondary" href="/profile">Back</a>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Form -->
        <form method="post" action="/profile/change-password">

          <div class="mb-3">
            <label class="form-label fw-semibold">Old Password</label>
            <input class="form-control" type="password" name="oldPassword" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">New Password</label>
            <input class="form-control" type="password" name="newPassword" required>
            <div class="form-text">
              Use at least 8 characters with numbers and letters.
            </div>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Update Password
          </button>

        </form>

      </div>

    </div>
  </div>
</div>

</body>
</html>
