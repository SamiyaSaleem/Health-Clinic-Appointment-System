<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Appointment</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">

      <div class="card-pro p-4 p-md-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <div class="brand-badge mb-2">
              <span class="brand-dot"></span>
              HealthTech Clinic
            </div>
            <h2 class="mb-1">Update Appointment</h2>
            <div class="small-muted">Edit appointment details below.</div>
          </div>

          <a class="btn btn-outline-secondary" href="/appointments/list">Back</a>
        </div>

        <form method="post" action="/appointments/update">
          <input type="hidden" name="id" th:value="${appointment.id}">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Patient Name</label>
              <input class="form-control" type="text" name="patientName" th:value="${appointment.patientName}" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Doctor Name</label>
              <input class="form-control" type="text" name="doctorName" th:value="${appointment.doctorName}" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Date</label>
              <input class="form-control" type="date" name="date" th:value="${appointment.date}" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Time</label>
              <input class="form-control" type="text" name="time" th:value="${appointment.time}" required>
            </div>
          </div>

          <button class="btn btn-brand text-white mt-4" type="submit">Save Changes</button>
        </form>

      </div>

    </div>
  </div>
</div>

</body>
</html>
