<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Appointments</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <div class="card-pro p-4 p-md-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <div class="brand-badge mb-2">
          <span class="brand-dot"></span>
          HealthTech Clinic
        </div>
        <h2 class="mb-1">View & Manage Appointments</h2>
        <div class="small-muted">Review, update, or delete booked appointments.</div>
      </div>

      <a class="btn btn-outline-secondary" href="/dashboard">Back</a>
    </div>

    <div th:if="${param.deleted}" class="alert alert-success">
      Appointment deleted successfully!
    </div>

    <div th:if="${param.updated}" class="alert alert-success">
      Appointment updated successfully!
    </div>

    <div th:if="${#lists.isEmpty(appointments)}" class="alert alert-info">
      No appointments found.
    </div>

    <table class="table table-bordered table-striped" th:if="${!#lists.isEmpty(appointments)}">
      <thead>
        <tr>
          <th>ID</th>
          <th>Patient Name</th>
          <th>Doctor Name</th>
          <th>Date</th>
          <th>Time</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="a : ${appointments}">
          <td th:text="${a.id}"></td>
          <td th:text="${a.patientName}"></td>
          <td th:text="${a.doctorName}"></td>
          <td th:text="${a.date}"></td>
          <td th:text="${a.time}"></td>
          <td class="d-flex gap-2">
            <a class="btn btn-sm btn-primary"
               th:href="@{/appointments/edit/{id}(id=${a.id})}">
              Update
            </a>

            <a class="btn btn-sm btn-danger"
               th:href="@{/appointments/delete/{id}(id=${a.id})}"
               onclick="return confirm('Are you sure you want to delete this appointment?')">
              Delete
            </a>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
</div>

</body>
</html>
